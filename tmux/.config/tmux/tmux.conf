# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# pass OSC 8 hyperlinks (gh, eza, ls --hyperlink, ...) through to ghostty
set -as terminal-features ",xterm-ghostty:hyperlinks"

set -g prefix2 C-a
bind C-a send-prefix -2

set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on
set -gq allow-passthrough on
set -g history-limit 100000
set -g mouse on
set-window-option -g mode-keys vi

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# prefix x kills the current WINDOW (with confirm — it's a whole task/worktree).
# Panes normally close by exiting their shell (C-d); prefix X force-kills a
# stuck pane (a hung process / TUI that won't take C-d).
bind-key x confirm-before -p "kill window #W? (y/n)" kill-window
bind-key X kill-pane
set -g detach-on-destroy off

# -- display -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g display-panes-time 800
set -g display-time 3000
set -g status-interval 10
set -g status-position top
set-option -g allow-rename off
set-window-option -g automatic-rename off

# -- navigation ----------------------------------------------------------------

# sessions
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# kill all other sessions (with confirm)
bind Q confirm-before -p "kill all other sessions? (y/n)" "kill-session -a"

# splits (in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# pane navigation (h/j/k/l)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r > swap-pane -D
bind -r < swap-pane -U

# pane resizing
bind -r J resize-pane -D 2
bind -r H resize-pane -L 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# pane break/join
bind-key ! break-pane -d -n _hidden_pane
bind-key @ join-pane -s $.1

# window navigation
unbind n
unbind p
# window switches clear the agent-done dot on the window you land on. The nav
# command runs first, so the inline `set -w @agent_done 0` (which runs in THIS
# client's context) targets the window you just moved to — the one reliable way
# to know it. recount then refreshes the ◷ badge (it's window-agnostic, so a
# background run-shell is fine). Clearing an unflagged window is a harmless no-op.
bind -r C-h previous-window \; set -w @agent_done 0 \; run-shell -b "bash ~/.config/tmux/scripts/tmux-agent-recount.sh"
bind -r C-l next-window     \; set -w @agent_done 0 \; run-shell -b "bash ~/.config/tmux/scripts/tmux-agent-recount.sh"
bind Tab last-window        \; set -w @agent_done 0 \; run-shell -b "bash ~/.config/tmux/scripts/tmux-agent-recount.sh"
bind-key N new-window -a
bind-key m command-prompt -I "#W" "rename-window '%%'"
bind-key M command-prompt -I "#S" "rename-session '%%'"

# window reordering
bind -n S-Left swap-window -t -1 \; select-window -t -1
bind -n S-Right swap-window -t +1 \; select-window -t +1

# clear screen
bind-key -T prefix C-k send-keys -R C-l \; clear-history

# -- copy mode -----------------------------------------------------------------

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi C-u send -X -N 10 scroll-up
bind -T copy-mode-vi C-d send -X -N 10 scroll-down
bind -T copy-mode-vi Escape send -X cancel

# -- jump (flash-style; vendored fork of easyjump.tmux) ------------------------

# prefix s: flash.nvim-style jump. Type to search; every match gets a label live
# as you type. Enter -> nearest match, a label key -> that match, Escape cancels.
# C-s does the same from inside copy mode. Lands the copy-mode cursor on the
# target and starts a selection (for copy). Source + rationale live in the local
# fork at scripts/easyjump/ (see DESIGN.md) — this is NOT the TPM plugin. 's'
# shadows tmux's stock choose-tree, already covered by prefix T (sesh)/prefix C-f.
bind-key s run-shell -b "$HOME/.config/tmux/scripts/easyjump/easyjump.sh"
bind-key -T copy-mode-vi C-s run-shell -b "$HOME/.config/tmux/scripts/easyjump/easyjump.sh"

# -- sesh ----------------------------------------------------------------------

bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

# -- worktrees -----------------------------------------------------------------

# prefix W: unified git-worktree popup (switch / create / remove).
# enter=switch the highlighted worktree, or create it if the typed name matches
# nothing; ctrl-n=force-create from typed name; ctrl-x=remove (loops back to the
# refreshed list). New worktrees go under ~/dev/.worktrees/<repo>/<branch>.
# On create: gitignored files/dirs (default ".env* .npmrc scripts.local", any
# depth; matched dirs copied whole) are copied from the main worktree, and a Node
# project auto-runs an install (pnpm/npm/yarn/bun, by lockfile) in its new window.
# Tune/disable with:
#   tmux set -g @worktree_copy_globs ".env* .npmrc scripts.local .duet docs.local"  (or "off" to disable)
#   tmux set -g @worktree_auto_install off
# NOTE: display-popup does NOT expand #{...} in its shell-command argument (only
# in -d), so we must NOT pass #{session_name} as an arg — it arrives literally.
# -d opens the popup in the pane's dir (so $PWD is the repo) and the script
# self-detects the session via `tmux display-message`.
bind W display-popup -E -w 80% -h 75% -d "#{pane_current_path}" \
	"exec ~/.config/tmux/scripts/tmux-worktree.sh"

# -- theme switcher ------------------------------------------------------------

# prefix t: pick a terminal theme (overrides clock-mode). Each item runs
# theme-set, which writes the choice and fans out reloads. See docs/theming.md.
bind t display-menu -T "#[align=centre] terminal theme " -x C -y C \
	"flexoki light"    f "run-shell '~/.local/bin/theme-set flexoki_light'" \
	"catppuccin mocha" c "run-shell '~/.local/bin/theme-set catppuccin_mocha'" \
	"tailwind light"   t "run-shell '~/.local/bin/theme-set tailwind_light'" \
	"tokyo night moon" m "run-shell '~/.local/bin/theme-set tokyo_night_moon'" \
	"gruvbox dark"     g "run-shell '~/.local/bin/theme-set gruvbox_dark'"

# -- plugins -------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
# stop the navigator from binding prefix C-l as clear-screen, which would
# clobber prefix C-l = next-window above (root C-l clears instead, see below)
set -g @vim_navigator_prefix_mapping_clear_screen ""
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'wfxr/tmux-fzf-url'
# keep continuum last so its status-right hook survives other plugins
set -g @plugin 'tmux-plugins/tmux-continuum'

# fzf-url: prefix u lists URLs from scrollback, Enter opens in browser
# --tac + --layout=reverse: most-recent URL on top and pre-selected (the plugin
# captures the pane oldest->newest, so without --tac fzf selects the OLDEST).
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-fzf-options '-p 60%,40% --no-sort --tac --layout=reverse --border-label " open url " --prompt "🔗  "'

# auto-save sessions every 15 min via resurrect; restore on server start
set -g @continuum-restore 'on'

# -- theme (catppuccin) -------------------------------------------------------

# Palette tracks the active terminal theme; theme-set re-sources this file on a
# switch (prefix-r works too). See docs/theming.md.
set -g @catppuccin_flavor "mocha"
# Resolve the active theme → its palette file, then force-load it. The theme
# files use `set -o` (only-if-unset), so after a switch a plain reload would
# keep every @thm_* color from the old palette — and the catppuccin plugin
# bakes @thm_* into its window/status formats at load time. The sed -ogq→-g
# strips the only-if-unset guard so the new palette actually wins. Selection +
# force-load are one run-shell so they can't race on @_theme_palette. It also
# sets the session-pill bg per theme here — tailwind uses the pale-blue
# surface_1, others keep green — leak-free (every switch re-runs this) and
# without editing the vendored catppuccin palette; the prefix-active red is
# preserved. `##{` keeps the format literal through run-shell's own expansion so
# it resolves at draw time (single `#{` would bake/empty it at set time).
run 'theme="$(tr -d "[:space:]" < ~/.config/terminal-theme 2>/dev/null)"; \
     theme="${theme:-${TERMINAL_THEME:-flexoki_light}}"; \
     case "$theme" in \
       catppuccin_mocha) palette="$HOME/.config/tmux/plugins/tmux/themes/catppuccin_mocha_tmux.conf"; session="##{E:@thm_green}" ;; \
       tailwind_light)   palette="$HOME/.config/tmux/themes/tailwind_tmux.conf";              session="##{E:@thm_surface_1}" ;; \
       tokyo_night_moon) palette="$HOME/.config/tmux/themes/tokyo_night_moon_tmux.conf";      session="##{E:@thm_green}" ;; \
       gruvbox_dark)     palette="$HOME/.config/tmux/themes/gruvbox_dark_tmux.conf";          session="##{E:@thm_green}" ;; \
       *)                palette="$HOME/.config/tmux/themes/flexoki_tmux.conf";               session="##{E:@thm_green}" ;; \
     esac; \
     tmux set -g @_theme_palette "$palette"; \
     tmux set -g @catppuccin_session_color "##{?client_prefix,##{E:@thm_red},$session}"; \
     sed "s/ -ogq / -g /" "$palette" | tmux source -'

# transparent status bar
set -g @catppuccin_status_background "none"

# "custom" window style = the stock "rounded" look, but with the cap glyphs
# drawn on bg=default. The stock rounded separators paint the caps on the
# theme's mantle color (via fg+reverse), which shows as dark square corners
# when the bar itself is transparent.
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_middle_separator " "
# ##{...} defers expansion to draw time so the caps always track the live
# palette. The left cap is window_active-conditional because the plugin
# applies the same left separator to current and inactive windows.
set -g @catppuccin_window_left_separator "#[fg=##{?window_active,##{@thm_mauve},##{@thm_overlay_2}},bg=default]#[fg=##{@thm_crust},bg=##{?window_active,##{@thm_mauve},##{@thm_overlay_2}}]"
set -g @catppuccin_window_right_separator "#[fg=##{@thm_surface_0},bg=default]"
set -g @catppuccin_window_current_right_separator "#[fg=##{@thm_surface_1},bg=default]"

# agent-done: a #{@thm_yellow} dot leads the chip when @agent_done is set on the
# window (set by tmux-agent-done.sh, cleared on focus). After the dot, fg is
# reset to @thm_fg — the name color the custom window style uses for #W (see
# @_ctp_w_text_style in catppuccin_tmux.conf) — so #W keeps its normal hue
# instead of inheriting the dot's yellow. Must be @thm_fg, not @thm_crust: on
# light themes fg==crust so either worked, but on dark themes (tokyo_night_moon,
# catppuccin_mocha) crust is near-black and would render the name dark-on-dark.
set -g @catppuccin_window_text " #{?@agent_done,#[fg=#{@thm_yellow}]●#[fg=#{@thm_fg}] ,}#W"
set -g @catppuccin_window_current_text " #{?@agent_done,#[fg=#{@thm_yellow}]●#[fg=#{@thm_fg}] ,}#W"

set -g status-left ""
set -g @catppuccin_session_icon "❖ "
# the plugin bakes these once with `set -o` on first load, freezing whatever
# palette was active then; raw #{@thm_*} refs resolve at draw time instead
set -g @catppuccin_status_session_icon_fg "#{@thm_crust}"
set -g @catppuccin_status_session_text_fg "#{@thm_fg}"
# agent-done: "◷ N" corner badge counts windows waiting on you in this session
# (@agents_ready, maintained by the agent scripts). Hidden when zero/unset.
set -g status-right "#{?@agents_ready,#[fg=#{@thm_yellow}]◷ #{@agents_ready}#[fg=default]  ,} #{E:@catppuccin_status_session}  "
set -g status-right-length 100

# bottom padding under the bar. tmux has no real padding knob — the status line
# is N whole rows tall (the `status` count, 1–5), nothing finer. So grow it to 2
# rows and leave the spare one blank. With status-position top, status-format[0]
# is the top row (the catppuccin bar, built from status-left/window-list/status-
# right) and status-format[1] renders directly beneath it against the panes — so
# a blank [1] reads as a one-line gap below the bar. status-style is `default`
# (bg none), so the blank row is transparent, not a colored band. tmux's own
# default status-format[1] shows pane geometry ("P: ..."); we override it empty.
set -g status 2
set -g status-format[1] ""

# initialize tpm (keep at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# Re-color the session pill per theme. The catppuccin session module bakes its
# icon bg into the module string when the plugin first loads (status_module.conf
# derives @catppuccin_status_session_icon_bg from @catppuccin_session_color —
# set per-theme in the selector above — only while it's unset, then bakes it).
# tpm won't re-run an already-loaded plugin on a config reload, so a theme switch
# would otherwise keep the stale color. Unset the derived bg and rebuild the
# module here so it picks up the current @catppuccin_session_color.
run 'tmux set -ug @catppuccin_status_session_icon_bg; \
     tmux source-file -F "$HOME/.config/tmux/plugins/tmux/status/session.conf"'

# -- responsive window tabs ----------------------------------------------------
# When the client is narrower than @window_collapse_width, INACTIVE window tabs
# collapse to just their rounded number badge; the current window keeps its full
# pill (it's one tab, not the clutter, and you always want to see where you are).
# This is pure tmux format, not a script/plugin: #{client_width} is re-evaluated
# on every status redraw (including the client-resized event), so tabs collapse
# and expand live as you resize, with nothing to run. Lives here (theme-INDEPENDENT
# layout logic) rather than in the per-theme palette files, which only set @thm_*.
# The agent-done signal survives the collapse: a waiting tab's number badge turns
# yellow (@thm_yellow) instead of the usual inactive aqua (@thm_overlay_2).
#   tmux set -g @window_collapse_width 0    # 0 = never collapse (disable)
#   tmux set -g @window_collapse_width 100  # collapse sooner (on wider terminals)
# 80 = the classic "narrow terminal" boundary: a few short tabs still fit at ~100
# cols (status-right only eats ~20), so only collapse once it's genuinely cramped.
set -gq @window_collapse_width 80
# Compact pill: rounded left cap (E0B6) + crust numeral on the badge + right cap
# (E0B4). Badge bg is yellow when @agent_done, else the inactive aqua.
set -gq @_wsf_compact "#[fg=#{?@agent_done,#{@thm_yellow},#{@thm_overlay_2}},bg=default]#[fg=#{@thm_crust},bg=#{?@agent_done,#{@thm_yellow},#{@thm_overlay_2}}] #I #[fg=#{?@agent_done,#{@thm_yellow},#{@thm_overlay_2}},bg=default]"
# Capture catppuccin's baked inactive pill ONCE as the wide branch, then swap
# window-status-format for a width conditional. The guard stops a config reload
# (which does NOT re-bake the plugin) from recapturing our own conditional into
# @_wsf_full; the #{@thm_*} refs inside the captured pill still resolve at draw
# time, so theme switches keep recoloring it with no recapture needed.
# NB: run-shell format-expands its command, so the conditional's #{...} are
# written as ##{...} to survive that pass and land literal (same reason the theme
# force-load above uses ##{ }). Capture must precede the override (one shell, so
# ordering is guaranteed) — else it would recapture our own conditional.
run 'if [ -z "$(tmux show -gv @_wsf_full 2>/dev/null)" ]; then \
       tmux set -gq @_wsf_full "$(tmux show -gv window-status-format)"; \
     fi; \
     tmux set -g window-status-format "##{?##{e|<:##{client_width},##{@window_collapse_width}},##{E:@_wsf_compact},##{E:@_wsf_full}}"'

# after tpm: the theme hardcodes teal-on-transparent for the command prompt /
# messages, unreadable on a light terminal. Use the window-chip colors instead;
# #{@thm_*} are resolved at draw time, so they track the active flavor.
set -g message-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"
set -g message-command-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"

# copy-mode selection + the scroll-position badge: the theme only sets a dark
# bg, leaving the terminal's (dark) fg unreadable. Gold with an ink fg reads
# well on both palettes.
set -g mode-style "fg=#{@thm_crust},bg=#{@thm_yellow},bold"

# agent-done: the dot is cleared by the window-nav bindings (prefix C-h/C-l/Tab,
# see "navigation" above) and by the worktree popup, NOT by a hook. A
# session-window-changed hook can't do it: inside that hook tmux's "current
# window" is still the OLD window, so the clear lands on the wrong one. A
# keybinding runs the nav command first, so the clear sees the new window.

# C-l clears the screen like outside tmux whenever there's nothing to
# navigate to. Replaces vim-tmux-navigator's root C-l (hence after tpm):
# in vim -> pass through; pane to the right -> select it; else -> clear
bind -n C-l if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'" \
    "send-keys C-l" \
    "if -F '#{pane_at_right}' 'send-keys C-l' 'select-pane -R'"
