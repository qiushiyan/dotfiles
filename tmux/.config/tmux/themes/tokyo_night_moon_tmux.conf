# vim:set ft=tmux:

# --> Tokyo Night (Moon) — dark arrangement
#
# Hand-tuned to match Ghostty's built-in "TokyoNight Moon" terminal palette
# (bg #222436, fg #c8d3f5, the same 16 accents). There is no vendored tokyonight
# tmux theme, so this mirrors the slot layout of the catppuccin plugin's
# catppuccin_mocha_tmux.conf. Slot meanings (via the catppuccin plugin +
# tmux.conf separators):
#   overlay_2  = inactive window number badge      surface_0 = window name chip,
#   mauve      = current window number badge                   message bg
#   crust      = numeral/icon fg on colored chips  surface_1 = current name chip
#   fg         = text on name chips                bg        = popup bg
# Vibrant arrangement (chosen over a flat slate look, like flexoki's teal+gold):
# inactive windows get a bright cyan number badge (overlay_2); the active window
# gets a purple badge (mauve) on a violet-tinted name chip (surface_1), so it
# reads as one cohesive purple unit instead of a barely-lighter grey. The plugin
# fixes the contrast direction — badges are bright (dark @thm_crust numerals),
# chips are dark (light @thm_fg names) — so the two are tuned to opposite ends.
# lavender (active pane border) stays synced to mauve; green is the session pill
# (set in tmux.conf's selector); yellow is the copy-mode selection. Two slots are
# tuned for the badges rather than left as literal Moon scale values (see below).
# Keys mirror plugins/tmux/themes/catppuccin_mocha_tmux.conf; loaded by the
# palette force-load in tmux.conf (which seds -ogq to -g).
set -ogq @thm_bg "#222436"
set -ogq @thm_fg "#c8d3f5"

# Colors (Tokyo Night Moon accents)
set -ogq @thm_rosewater "#fca7ea"
set -ogq @thm_flamingo "#fca7ea"
set -ogq @thm_pink "#fca7ea"
set -ogq @thm_mauve "#c099ff"
set -ogq @thm_red "#ff757f"
set -ogq @thm_maroon "#ff757f"
set -ogq @thm_peach "#ff966c"
set -ogq @thm_yellow "#ffc777"
set -ogq @thm_green "#c3e88d"
set -ogq @thm_teal "#4fd6be"
set -ogq @thm_sky "#86e1fc"
set -ogq @thm_sapphire "#82aaff"
set -ogq @thm_blue "#82aaff"
set -ogq @thm_lavender "#c099ff"

# Surfaces and overlays (Tokyo Night Moon base scale, dark)
set -ogq @thm_subtext_1 "#c8d3f5"
set -ogq @thm_subtext_0 "#828bb8"
# overlay_2 = inactive window number badge bg. Tuned to Moon's cyan (a real
# accent token) instead of the grey scale value (#737aa2/#828bb8) so every
# inactive window carries color — dark @thm_crust numerals read on it.
set -ogq @thm_overlay_2 "#86e1fc"
set -ogq @thm_overlay_1 "#636da6"
set -ogq @thm_overlay_0 "#545c7e"
set -ogq @thm_surface_2 "#444a73"
# surface_1 = active window name chip bg. Improvised violet-slate (NOT a literal
# Moon token): Moon's elevated surface (#3b4261, fg_gutter) is nearly identical
# to surface_0, so the active window was indistinguishable. This nudges it toward
# the purple badge (mauve) so the active pill reads as a single purple unit;
# stays dark enough for light @thm_fg names.
set -ogq @thm_surface_1 "#3d3868"
set -ogq @thm_surface_0 "#2f334d"
set -ogq @thm_mantle "#1e2030"
# crust stays near-black: numeral fg on the purple/green/gold badges, session
# icon fg on the green chip, and the copy-mode selection fg
set -ogq @thm_crust "#191b29"
