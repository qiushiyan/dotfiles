# vim:set ft=tmux:

# --> Flexoki (https://stephango.com/flexoki)
#
# Same slot arrangement as the catppuccin mocha theme — dark chips, light
# text, 400-series accents — so the status bar keeps the original mocha-style
# contrast on the flexoki_light terminal, just with Flexoki hues.
# Keys mirror plugins/tmux/themes/catppuccin_mocha_tmux.conf; loaded by the
# palette force-load in tmux.conf (which seds -ogq to -g).
set -ogq @thm_bg "#100F0F"
set -ogq @thm_fg "#CECDC3"

# Colors (Flexoki 400-series accents)
set -ogq @thm_rosewater "#D14D41"
set -ogq @thm_flamingo "#D14D41"
set -ogq @thm_pink "#CE5D97"
set -ogq @thm_mauve "#8B7EC8"
set -ogq @thm_red "#D14D41"
set -ogq @thm_maroon "#AF3029"
set -ogq @thm_peach "#DA702C"
set -ogq @thm_yellow "#D0A215"
set -ogq @thm_green "#879A39"
set -ogq @thm_teal "#3AA99F"
set -ogq @thm_sky "#4385BE"
set -ogq @thm_sapphire "#4385BE"
set -ogq @thm_blue "#4385BE"
set -ogq @thm_lavender "#8B7EC8"

# Surfaces and overlays (Flexoki base scale)
set -ogq @thm_subtext_1 "#B7B5AC"
set -ogq @thm_subtext_0 "#878580"
set -ogq @thm_overlay_2 "#878580"
set -ogq @thm_overlay_1 "#6F6E69"
set -ogq @thm_overlay_0 "#575653"
set -ogq @thm_surface_2 "#403E3C"
set -ogq @thm_surface_1 "#343331"
set -ogq @thm_surface_0 "#282726"
set -ogq @thm_mantle "#1C1B1A"
set -ogq @thm_crust "#100F0F"
