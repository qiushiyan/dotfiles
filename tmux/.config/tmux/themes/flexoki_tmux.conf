# vim:set ft=tmux:

# --> Flexoki (https://stephango.com/flexoki), "vibrant light" arrangement
#
# Tuned for the flexoki_light terminal: colored number badges (cyan inactive,
# gold current) on warm light-gray name chips with ink text. Slot meanings
# (via the catppuccin plugin + tmux.conf separators):
#   overlay_2  = inactive window number badge      surface_0 = window name chip,
#   mauve      = current window number badge                   message bg
#   crust      = numeral/icon fg on colored chips  surface_1 = current name chip
#   fg         = text on name chips                bg        = popup bg
# the active pill is two-tone: gold number badge (mauve) + pale sand name
# chip (surface_1, gold mixed 35/65 with paper); lavender (active pane
# border) stays synced to the gold.
# Keys mirror plugins/tmux/themes/catppuccin_mocha_tmux.conf; loaded by the
# palette force-load in tmux.conf (which seds -ogq to -g).
set -ogq @thm_bg "#FFFCF0"
set -ogq @thm_fg "#100F0F"

# Colors (Flexoki 400-series accents)
set -ogq @thm_rosewater "#D14D41"
set -ogq @thm_flamingo "#D14D41"
set -ogq @thm_pink "#CE5D97"
set -ogq @thm_mauve "#D0A215"
set -ogq @thm_red "#D14D41"
set -ogq @thm_maroon "#AF3029"
set -ogq @thm_peach "#DA702C"
set -ogq @thm_yellow "#D0A215"
set -ogq @thm_green "#879A39"
set -ogq @thm_teal "#3AA99F"
set -ogq @thm_sky "#4385BE"
set -ogq @thm_sapphire "#4385BE"
set -ogq @thm_blue "#4385BE"
set -ogq @thm_lavender "#D0A215"

# Surfaces and overlays (Flexoki base scale, light)
set -ogq @thm_subtext_1 "#403E3C"
set -ogq @thm_subtext_0 "#575653"
set -ogq @thm_overlay_2 "#3AA99F"
set -ogq @thm_overlay_1 "#6F6E69"
set -ogq @thm_overlay_0 "#878580"
set -ogq @thm_surface_2 "#B7B5AC"
set -ogq @thm_surface_1 "#EFDCA3"
set -ogq @thm_surface_0 "#DAD8CE"
set -ogq @thm_mantle "#F2F0E5"
# crust stays ink: numeral fg on the cyan/gold badges, session icon fg on
# the green chip, and the copy-mode selection fg
set -ogq @thm_crust "#100F0F"
