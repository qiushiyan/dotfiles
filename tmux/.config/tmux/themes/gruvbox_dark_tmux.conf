# vim:set ft=tmux:

# --> Gruvbox (dark, medium) — retro-groove warm dark arrangement
#
# Palette is the canonical morhetz/gruvbox set (https://github.com/morhetz/gruvbox),
# which matches Ghostty's built-in "Gruvbox Dark" (medium, bg #282828) exactly, so
# the terminal and tmux agree. There is no vendored gruvbox tmux theme that feeds
# the catppuccin plugin's @thm_* slots, so this is hand-authored like the other
# non-catppuccin themes. Same vibrant badge design as tokyo_night_moon, in warm
# tones: inactive windows get an aqua number badge (overlay_2); the active window
# gets gruvbox's signature orange badge (mauve) on a warm-brown name chip
# (surface_1), reading as one cohesive orange unit. The plugin fixes the contrast
# direction — badges are bright (dark @thm_crust numerals), chips are dark (light
# @thm_fg names) — so the two are tuned to opposite ends. lavender (active pane
# border) stays synced to mauve; green is the session pill (set in tmux.conf's
# selector); yellow is the copy-mode selection. surface_1 is the one improvised
# value (see below).
# Keys mirror plugins/tmux/themes/catppuccin_mocha_tmux.conf; loaded by the
# palette force-load in tmux.conf (which seds -ogq to -g).
set -ogq @thm_bg "#282828"
set -ogq @thm_fg "#ebdbb2"

# Colors (gruvbox bright accents — the dark-mode default set)
set -ogq @thm_rosewater "#d3869b"
set -ogq @thm_flamingo "#d3869b"
set -ogq @thm_pink "#d3869b"
set -ogq @thm_mauve "#fe8019"
set -ogq @thm_red "#fb4934"
set -ogq @thm_maroon "#fb4934"
set -ogq @thm_peach "#fe8019"
set -ogq @thm_yellow "#fabd2f"
set -ogq @thm_green "#b8bb26"
set -ogq @thm_teal "#8ec07c"
set -ogq @thm_sky "#8ec07c"
set -ogq @thm_sapphire "#83a598"
set -ogq @thm_blue "#83a598"
set -ogq @thm_lavender "#fe8019"

# Surfaces and overlays (gruvbox bg/fg scale, dark)
set -ogq @thm_subtext_1 "#d5c4a1"
set -ogq @thm_subtext_0 "#a89984"
# overlay_2 = inactive window number badge bg. Tuned to gruvbox's aqua (a real
# accent) instead of a grey so every inactive window carries color — dark
# @thm_crust numerals read on it.
set -ogq @thm_overlay_2 "#8ec07c"
set -ogq @thm_overlay_1 "#928374"
set -ogq @thm_overlay_0 "#7c6f64"
set -ogq @thm_surface_2 "#665c54"
# surface_1 = active window name chip bg. Improvised warm brown (NOT a literal
# gruvbox token): nudges bg toward the orange badge (mauve) so the active pill
# reads as a single orange unit; stays dark enough for light @thm_fg names.
set -ogq @thm_surface_1 "#4a3a2c"
set -ogq @thm_surface_0 "#3c3836"
set -ogq @thm_mantle "#32302f"
# crust stays near-black (bg0_hard): numeral fg on the aqua/orange/green badges,
# session icon fg on the green chip, and the copy-mode selection fg
set -ogq @thm_crust "#1d2021"
