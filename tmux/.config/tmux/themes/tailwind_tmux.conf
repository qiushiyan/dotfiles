# vim:set ft=tmux:

# --> Tailwind CSS (light), ported from the Zed "Tailwind CSS Light (Enhanced)"
#     theme. Same dark-chip-on-light design as flexoki_tmux.conf, Tailwind hues:
# colored number badges (sky inactive→slate, current→sky accent #00a6f4) on
# slate name chips with slate-800 text. Slot meanings (via the catppuccin plugin
# + tmux.conf separators):
#   overlay_2  = inactive window number badge      surface_0 = window name chip,
#   mauve      = current window number badge                   message bg
#   crust      = numeral/icon fg on colored chips  surface_1 = current name chip
#   fg         = text on name chips                bg        = popup bg
# the active pill is two-tone: sky number badge (mauve) + pale-blue name chip
# (surface_1); lavender (active pane border) stays synced to the sky accent.
# Keys mirror plugins/tmux/themes/catppuccin_mocha_tmux.conf; loaded by the
# palette force-load in tmux.conf (which seds -ogq to -g).
set -ogq @thm_bg "#FFFFFF"
set -ogq @thm_fg "#1D293D"

# Colors (Tailwind accents)
set -ogq @thm_rosewater "#C70036"
set -ogq @thm_flamingo "#C70036"
set -ogq @thm_pink "#9810FA"
set -ogq @thm_mauve "#00A6F4"
set -ogq @thm_red "#C70036"
set -ogq @thm_maroon "#EC003F"
set -ogq @thm_peach "#E17100"
set -ogq @thm_yellow "#FE9A00"
set -ogq @thm_green "#009966"
set -ogq @thm_teal "#0092B8"
set -ogq @thm_sky "#00A6F4"
set -ogq @thm_sapphire "#1447E6"
set -ogq @thm_blue "#155DFC"
set -ogq @thm_lavender "#00A6F4"

# Surfaces and overlays (Tailwind slate scale, light)
set -ogq @thm_subtext_1 "#314158"
set -ogq @thm_subtext_0 "#45556C"
set -ogq @thm_overlay_2 "#CAD5E2"
set -ogq @thm_overlay_1 "#62748E"
set -ogq @thm_overlay_0 "#90A1B9"
set -ogq @thm_surface_2 "#CAD5E2"
set -ogq @thm_surface_1 "#BEDBFF"
set -ogq @thm_surface_0 "#E2E8F0"
set -ogq @thm_mantle "#F1F5F9"
# crust stays ink: numeral fg on the sky/amber badges, session icon fg on the
# chip, and the copy-mode selection fg
set -ogq @thm_crust "#1D293D"
