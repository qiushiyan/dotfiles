expand = '''
Create a technical plan from our discussion.

**Structure:**
1. A few focused phases, each ending in its own commit.
2. **Delete complexity, don't rearrange it.** Concepts, modes, and branches should disappear, not get moved around. Prefer clean architecture and clear integration points over ad-hoc patches — the right plan should feel inevitable, not clever.
3. If existing architecture blocks a clean solution, redesign from first principles around the actual problem — composition and data structures tailored to it.
4. **Verification per phase** — for each phase, say how you'll confirm it works: the key behaviors to test (not exhaustive), or another check where a test doesn't fit. Note anything deliberately left unverified and why.

