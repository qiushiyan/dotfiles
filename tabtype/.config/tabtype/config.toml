[[snippets]]
key = "commits-summary"
expand = "Commits summary for high-level context — what changed and why. **Don't review commit-by-commit;** review the current state of the codebase as a whole, with these commits as context."

[[snippets]]
key = "implementation-handoff"
expand = '''
Implementation finished. Write a handoff that orients the reviewer fast — **report what changed and point them at what matters.** Ground it in the actual code and commits, not memory.

This is a guided map, **not a self-review** — don't grade your own work ("correct", "clean", "well-tested"); that's the reviewer's call. Do surface where the bodies are buried.

- **What & why:** the problem solved, tied back to the spec — a line or two.
- **Change map:** the files/modules touched, with the **load-bearing** ones marked. Skip trivial churn — the reviewer can read the diff; tell them where to start.
- **Key decisions & tradeoffs:** judgment calls made while implementing, especially structural ones (a boundary drawn here, a concept collapsed there), and any alternative you weighed and rejected.
- **Deviations from spec/plan:** where the code diverged and why. **Be candid.**
- **Tests:** what's covered and at what altitude (behavior vs. internals), plus what you deliberately left untested and why.
- **Where to look hardest:** the riskiest, most complex, or least-certain changes — anything you're unsure about or that fought you. This is the part that earns its keep.'''

[[snippets]]
key = "review-implementation"
expand = '''
Code-review my implementation. **Read the actual code, not just commit messages.**

**Lens:**
- Implementation is fair game across the board — correctness, structure, test quality, performance, readability, edge cases, pattern consistency.
- Plan ↔ code mismatches → flag silent deviations (missing planned tests, missing helpers, scope creep).
- Spec/plan are settled — **don't relitigate approved decisions**. If a fundamental issue only surfaces from the code, say so explicitly; don't smuggle it in as a "small fix."

**Evaluate:**

- **Correctness** — bugs, edge cases, failure modes.
- **Solves the problem** — does the implementation actually solve the spec's problem, not just pass its own tests?
- **Test quality** — right altitude (behavior, not internals), covers planned cases + obvious additions, survives plausible refactors, uses project patterns.
- **UX & performance** — user-facing impact, performance characteristics.
- **Structural quality — be ambitious, not just local:**
    - **Code-judo:** is there a reframing that makes whole branches, helpers, modes, conditionals, or layers disappear entirely — not just rearranges them? Don't stop at "this could be a bit cleaner."
    - **Spaghetti growth:** ad-hoc conditionals or special cases bolted into unrelated flows = design problem, not a stylistic nit. Push the logic behind its own abstraction.
    - **Thin abstractions:** pass-through wrappers, identity helpers, abstractions that add indirection without buying clarity — flag them.
    - **Boundary cleanliness:** casts, `any`, `unknown`, optionality papering over unclear invariants — push for an explicit contract.
    - **Canonical layer:** is the logic in the right module/package, or leaking across boundaries? Prefer existing canonical helpers over near-duplicates.

**Per issue:**
- Severity: **critical** (blocks merge) / **moderate** (fix before merge) / **minor** (nice-to-have).
- Concrete fix with file/function references and enough detail to act on.
- No "this could be cleaner" without a concrete alternative.

**Approval bar:** don't pass because it works. Structural regressions and missed code-judo opportunities are presumptive blockers — flag as **critical**, not minor.

Implementation report below — treat it as a starting point: the implementer's pointers to reduce your overhead, not the boundary of your review. Review the whole feature against its actual goal, and actively look for what the report leaves out; if you only check what the implementer surfaced, it isn't an independent review.

---

$0'''

[[snippets]]
key = "respond-review"
expand = '''
Senior engineer's review feedback below. **For each point:**
1. **Assess validity** — be honest, don't agree just to agree.
2. **If valid:** propose a fix (may be better than suggested) and explain why.
3. **If you disagree:** explain from first principles why the original is correct. Simple fixes that improve design → **work on them, don't defer as "minor"**.

**Structural feedback** — engage with the reframing the reviewer proposed. Don't counter with a narrower local patch, and don't defer the deletion path as "future work."

**Test implications** — for each valid finding, reason about what it means for the tests (analysis only — don't write them yet):
- **Why didn't a test catch this?** A genuine coverage gap (untested behavior), or a weak test that should have caught it but didn't — wrong altitude, asserting internals, over-mocked? A bug that slipped through is a signal about test quality, not just a missing case.
- **What does the fix change in the suite?** A new test for the now-correct behavior, a strengthened existing test, or tests to **delete** because the fix removes the behavior or branch they covered.

**Do not change any code yet — focus on analysis.**

---

$0'''

[[snippets]]
key = "review-implementation-again"
expand = '''
Updated the files per your suggestions (summarized below for targeted re-check). Focus on **whether feedback was actually integrated**, and flag any off-track changes or unintended regressions. Elaborate disagreements.

**Test changes** — where a fix touched tests, check they hold up: new or strengthened tests actually cover the behavior that slipped (right altitude, not asserting internals), and any deleted test was genuinely made obsolete, not dropped to get to green.

---

$0'''

[[snippets]]
key = "respond-review-again"
expand = '''
Round-2 reviewer feedback below. Apply valid points and update the code. Disagreements: explain briefly, don't dwell — **this round is about converging**. Major disagreement needing my input → flag clearly and **stop** instead of pushing through.

---

$0'''

# ── Wrap-up ───────────────────────────────────────────

[[snippets]]
key = "compact-for-cleanup"
expand = '''
/compact Implementation is essentially done and polished through review — only small, non-blocking tasks remain (docs, minor fixes, cleanup). Compact for a **focused window on the finished code**, not on how we built it.

**Preserve:**
- What the feature does and its user-facing intent — enough to write accurate docs.
- The current state of the implementation: what was built and where it lives (key modules/files), and any decision or invariant docs or callers must respect.
- The remaining tasks — the specific docs, fixes, and cleanup still to do.

**Drop:**
- The whole spec → plan → review journey: alternatives, plan iterations, review rounds, and the back-and-forth that produced the code.
- Reasoning debates and superseded critiques — the code already reflects their conclusions.'''

[[snippets]]
key = "pr-description"
expand = '''
Write a PR description aimed at a technical colleague who **won't read the diff**.

**Format:**
1. **Top (1–2 sentences):** direct impact in product/user-facing terms — what changed for the world, even if work is purely technical. Lead with this.
2. **Body (3–5 sentences):** the substance of what changed and why it was done this way. Name components/functions **only when load-bearing** for the reader's mental model — don't enumerate.

**Avoid:** line-by-line or file-by-file changelogs, line number references, restating the obvious (e.g., "added a function that does X" when X was the whole point).

Reader should leave with a clear mental model of **what we did and why** — not how every piece works.'''

[[snippets]]
key = "find-similar-bugs"
expand = '''
Bug just fixed. Before committing, sweep the codebase for other places likely to have the same pattern — same assumption, same missing check.

**Per candidate:**
- file + brief description
- why same class of bug
- confidence (high / medium / low)

**Don't fix yet** — just enumerate. We'll decide what to address.'''

# ── Standalone helpers ────────────────────────────────

[[snippets]]
key = "compact-inflight"
expand = '''
/compact This compaction lands mid-work — the same task continues right after it, so compact for **continuing**, not for a stage transition: keep the work's live state, drop the journey.

**Preserve:**
- The work in flight and its exact state: what's in progress, files mid-edit, the next intended step.
- Every decision already made, with its reason.
- The concrete repo facts in use: paths, commands, test state, the working branch.

**Drop or summarize:**
- The exploration journey, superseded drafts, and old tool output — keep conclusions, not the path.

The committed artifacts survive on disk — cite their paths rather than restating them.
'''

[[snippets]]
key = "list-assumptions"
expand = '''
List every non-trivial assumption you're making — about the data, system state, my actual intent, failure modes, or what "done" looks like.

**Group as:**
- **Verified** — confirmed from code or my message
- **Likely** — reasonable inference, unconfirmed
- **Speculative** — guessing

Flag the speculative ones as questions for me before proceeding.'''

[[snippets]]
key = "trace-execution"
expand = '''
Walk through this code step-by-step as if you were the runtime. **Per step:**
- variable values
- which branch is taken and why
- what gets called, with what arguments

Use a concrete example input. **Stop and flag the moment behavior diverges from intent.** Don't summarize — actually trace.'''

[[snippets]]
key = "smart-adapt-skills"
expand = '''
References are **general best practices, not prescriptions**. Evaluate each suggestion against our codebase, architecture, and constraints before applying — **discard what doesn't fit, adapt what does**.

Can't find a referenced skill? Tell me immediately for the exact path. **Don't search for it yourself.**'''

[[snippets]]
key = "technical-difficulty"
expand = '''
**Don't measure technical difficulty by lines changed.** Instead, consider:
- complexity of the problem being solved
- number of components affected
- potential for unintended consequences
- level of uncertainty involved

**Most importantly:** does this solve the core UX problem while maintaining a clean technical design?'''

[[snippets]]
key = "use-latest-stack"
expand = '''
When the work needs non-trivial, well-understood mechanical logic — retries and backoff, concurrency limiting, parsing, date/time math, and the like — choose deliberately between the platform's own primitives, a small specialized library, and writing it yourself. Hand-rolling a solved problem wastes effort; a new dependency is maintenance forever — take the lightest option that genuinely fits. Training data lags real releases, so ground the choice in what the stack offers *now*, not memory.

- **Prefer current stable platform primitives when they cover the need** — runtimes keep absorbing what libraries used to own. In TypeScript, `Intl` handles most date/time and number formatting without `date-fns`; native `fetch`, `structuredClone`, and `AbortController` replaced their old library equivalents. Confirm what's stable now rather than reaching for a dependency from habit.
- **Reach for a small, specialized library when it owns a genuinely tricky problem the platform doesn't** — retry/backoff and concurrency queues are the clear wins (e.g. `p-retry`, `p-queue`). Keep it specialized: a general-purpose giant pulled in for one function (Lodash for a `groupBy`) is its own cost, and a larger framework earns its place only for the genuinely complex state or processing it's built for — say why if you reach for one.
- **When you adopt one**, first check the repo doesn't already depend on something that covers it. Then **confirm its current API with Context7** and **use web search for best practices, common pitfalls, the latest version, and any breaking changes** — a call from memory may be deprecated, and that error compounds straight into the build. Match how nearby code already wires its dependencies. If you can't reach either tool, don't guess from memory — name the specific API surfaces that need verifying so they get checked.

Skip this for the repo's own code and stable language/runtime facts — read those from the source here. It's for the moving parts you don't control. A dependency weighty enough to be an architecture decision in its own right is the user's call, not a silent add — surface it.'''

[[snippets]]
key = "handle-review"
expand = '''
Consider the code review feedback critically and reason if they are valid. If valid, what's a clean
and integrated solution should be, which might be different than what the reviewer originally
suggested. Discard requests that are out of scope for this session, but also value small things that genuinly improves code quality and readability, don't defer them just because they are small. Think from first principles and our overall sesssion goals.
'''


[settings]
scan_depth = 5
material = "glass"
appearance = "light"
case_sensitive = false
max_branch_age_days = 90
badge_palette = "minimal"
ignore_patterns = ["node_modules", ".git", "dist", "build"]


trigger = ";;"
providers = [
  "recent",
  "files",
  "app",
  "manual",
  "skills",
  "git",
  "docs",
  "scripts",
]
