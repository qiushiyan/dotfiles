# ── Direct build (skip spec/plan) ─────────────────────

[[snippets]]
key = "implement-direct"
expand = '''
Build the change directly from what we settled in our discussion — that's the spec here; there's no separate spec or plan doc. This is small, well-understood work, so treat what follows as a lens scaled to the change, not ceremony — adapt it, drop what doesn't fit.

## Read these first, then build
Read each and adapt it to this change — the bar, not optional background; don't go hunting them mid-build, and ask me for a path if one's missing.
- `~/.config/lessons/codebase-design/deep-modules.md` — deep modules, seams, the deletion test, illegal states
- `~/.config/lessons/testing/tdd-loop.md` — vertical slices, behavior-focused tests, mock only at boundaries, anti-patterns

## Before you write code
- **Re-read what we settled** — the direction and target shape are decided; execute them, don't re-decide.
- **Re-read the code you're about to touch** — trace the real data/control flow and existing patterns, so the change fits what's already there.

## How to build it

### Slicing
Build in **vertical slices** — one meaningful unit at a time (a behavior plus the wiring that belongs with it), each independently committable, one slice per commit. Lean larger, and **prefer a shape that deletes a concept** — a branch, mode, or helper layer disappears — over one that just rearranges it. If the foundation needs reshaping first, do it as a **behavior-preserving** step kept green before the change lands on it.

### Right-size the code
The default failure here is too much code, not too little — defensive branches for cases that can't occur, and abstractions invented before the pattern is real. Build against it:
- **Make a bad state impossible to construct, don't guard against it.** Reach for a type, a narrow constructor, or an enum an invalid value can't inhabit, over runtime guards repeated at every call site. Validate untrusted input once at the boundary (*parse, don't validate*); let a real invariant violation fail loudly rather than hide behind a fallback.
- **Prefer a little duplication over the wrong abstraction.** Pull out a shared abstraction only when the pattern is real (around the third occurrence) and doing so *concentrates* complexity instead of just moving it (the deletion test).
- **Build only what we settled** — no speculative features, config knobs, or extensibility seams nobody asked for; each is maintenance forever.

### Tests
Write each test against **real** behavior as you build its slice, not a batch up front against imagined shapes — behavior through the public interface, covering the critical paths and complex logic, not every edge case (skip UI tests unless asked). Apply red-green-refactor inside a slice when design is uncertain or behavior is subtle; test and code together is fine otherwise. Run them as you go and keep them green.

If a decision turns out wrong or underspecified once you're in the code, **stop and flag it** rather than guessing your way past it.'''

# ── Mid-implementation checkpoint ─────────────────────

[[snippets]]
key = "midpoint-status"
expand = '''
Pausing mid-implementation for a checkpoint review. Summarize the current state so a reviewer can pick it up cold — **status snapshot, not a self-review**.

- **Where we are:** which slices are done and committed, and the slice you paused at (e.g. "4 of ~12").
- **What's done:** per completed slice, the behavior it added and any decision worth knowing — one line each, no code dumps.
- **What's left:** the remaining slices in planned order, briefly.
- **Test state:** what's covered so far and at what altitude, plus any test debt you've deferred (slices committed light on tests, placeholder mocks) — surface it rather than let it hide.
- **Deviations & surprises:** where the code diverged from the plan, what turned out harder or different than expected, and any plan assumption that didn't hold. **Be candid here — this is the highest-signal part.**
- **Open questions / risks** you're carrying into the rest of the work.

Ground it in the actual commits and code, not memory.'''

[[snippets]]
key = "review-midpoint"
expand = '''
Implementation is **paused mid-way** — only some slices are done; the rest are intentionally not built yet. Review the work so far AND set up the rest to go well. **Read the actual code, not just the status report below.**

Two jobs:

**1. Review what's done.**
- **Correctness & tests** of completed slices — bugs, edge cases, test altitude.
- **Foundation soundness** — everything left builds on this. Are the abstractions, seams, and data structures chosen so far going to *hold* for the remaining slices, or will they need to be torn up later? Code-judo, spaghetti growth, thin abstractions, leaky boundaries, wrong canonical layer — flag them now while they're cheap.
- **Plan ↔ code tracking** — silent deviations, missing planned tests for *completed* slices.

**2. Guide the rest.**
- **Gotchas & traps** the remaining slices will hit given the current code — invariants to keep, sequencing hazards, places the existing shape fights what's coming.
- **Plan course-correction** — given what the code actually revealed, does the remaining plan still hold? Re-sequence, re-scope, or reshape a slice if warranted — say so explicitly. A remaining slice that could *delete* something already written is a win; call it out.
- **Tips** — existing helpers/patterns to reuse instead of reinventing.

**Time-axis altitude lens:**
- Slices not yet reached → **intentionally undone, do NOT flag as missing**.
- A foundational/structural problem that will **compound** across the remaining slices → **highest priority** — catching it at slice 4 is far cheaper than at slice 12. Flag loudly.
- A purely local nit in completed code that doesn't affect what's left → note briefly or leave it for the final review; **don't dwell**.

**Per issue:** mark **fix-before-continuing** vs **fine to defer to the final review**, and give a concrete fix with file/function references.

Status report from the implementer below for context.

---

